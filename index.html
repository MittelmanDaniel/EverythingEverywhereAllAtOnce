<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verse Walker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --void: #050407;
    --void-warm: #0a0810;
    --silver-100: #f0ecf5;
    --silver-200: #d4cee0;
    --silver-300: #a89eb8;
    --silver-400: #7a6f90;
    --silver-500: #4d4460;
    --silver-600: #2e2840;
    --thread-glow: rgba(210,200,235,0.5);
    --warm: #d4a574;
    --warm-soft: #c49870;
    --cool: #8b9fd4;
    --violet: #b48fd4;
    --violet-deep: #8a6aad;
    --rose: #c47a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--silver-100);
    font-family: 'Playfair Display', Georgia, serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ===== CANVAS LAYERS ===== */
  canvas#bg-field { position: fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
  canvas#threads { position: fixed; top:0; left:0; width:100%; height:100%; z-index:2; }
  canvas#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:3; }

  .atmosphere {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index:4; pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(180,143,212,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(139,159,212,0.025) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(5,4,7,0.6) 100%);
  }

  .grain {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index:5; pointer-events:none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ===== MAP VIEW (default) ===== */
  #map-view {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index: 10; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #map-view.hidden { opacity:0; pointer-events:none; }

  .header {
    position: absolute; top: 36px; left: 44px;
    opacity:0; animation: fadeSlideDown 1.5s ease 0.3s forwards;
  }
  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--silver-400);
  }
  .header .sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--silver-500);
    margin-top: 6px;
  }

  .footer-left {
    position: absolute; bottom: 32px; left: 44px;
    opacity:0; animation: fadeSlideUp 1.5s ease 1.2s forwards;
  }
  .footer-left span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--silver-500);
  }
  .footer-left span em { color: var(--silver-300); font-style: normal; }

  .footer-right {
    position: absolute; bottom: 32px; right: 44px;
    text-align: right;
    opacity:0; animation: fadeSlideUp 1.5s ease 1.6s forwards;
  }
  .footer-right p {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--silver-600);
    line-height: 2;
    text-transform: uppercase;
  }

  /* ===== TOOLTIP on hover ===== */
  #tooltip {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    max-width: 300px;
  }
  #tooltip.visible { opacity: 1; }

  .tip-chrome {
    background: rgba(10,8,16,0.92);
    border: 1px solid rgba(200,190,225,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 6px;
    padding: 16px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(180,143,212,0.04);
  }

  .tip-time {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--violet);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .tip-url {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--cool);
    opacity: 0.5;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }
  .tip-title {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.4;
    color: var(--silver-100);
    margin-bottom: 8px;
  }
  .tip-whisper {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    line-height: 1.45;
    color: var(--warm);
    opacity: 0.75;
  }
  .tip-cta {
    margin-top: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--silver-500);
  }
  .tip-cta span { color: var(--silver-300); }

  /* ===== PORTAL TRANSITION ===== */
  #portal-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  #portal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  #portal-canvas {
    width: 100%; height: 100%;
  }

  /* ===== VERSE VIEW (alternate life) ===== */
  #verse-view {
    position: fixed; top:0; left:0; width:100%; height:100%;
    z-index: 80;
    opacity: 0;
    pointer-events: none;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--void);
    transition: opacity 0.6s ease;
  }
  #verse-view.active {
    opacity: 1;
    pointer-events: all;
  }

  #verse-view::-webkit-scrollbar { width: 3px; }
  #verse-view::-webkit-scrollbar-track { background: transparent; }
  #verse-view::-webkit-scrollbar-thumb { background: var(--silver-600); border-radius: 2px; }

  .verse-back {
    position: fixed; top: 32px; left: 40px; z-index: 90;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--silver-500);
    cursor: pointer;
    padding: 8px 14px;
    border: 1px solid rgba(200,190,225,0.08);
    border-radius: 3px;
    background: rgba(10,8,16,0.8);
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    display: none;
  }
  .verse-back:hover { color: var(--silver-200); border-color: var(--silver-400); }
  .verse-back.visible { display: block; }

  .verse-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 120px 40px 100px;
  }

  .verse-origin {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 8px;
    opacity:0; transform: translateY(12px);
  }
  .verse-origin.reveal { animation: revealUp 0.8s ease forwards; }

  .verse-source-url {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--cool);
    opacity: 0.35;
    margin-bottom: 32px;
    opacity:0; transform: translateY(12px);
  }
  .verse-source-url.reveal { animation: revealUp 0.8s ease 0.1s forwards; }

  .verse-title {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 1.2;
    color: var(--silver-100);
    margin-bottom: 12px;
    opacity:0; transform: translateY(20px);
  }
  .verse-title.reveal { animation: revealUp 1s ease 0.2s forwards; }

  .verse-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    color: var(--warm);
    opacity: 0.7;
    margin-bottom: 50px;
    opacity:0; transform: translateY(16px);
  }
  .verse-subtitle.reveal { animation: revealUp 0.8s ease 0.35s forwards; }

  /* Video generation area */
  .verse-video-area {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    margin-bottom: 50px;
    border: 1px solid rgba(200,190,225,0.06);
    opacity:0; transform: translateY(20px);
  }
  .verse-video-area.reveal { animation: revealUp 1s ease 0.45s forwards; }

  .video-bg {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(160deg, #0e0c16 0%, #0a0812 40%, #080610 100%);
  }
  .video-bg::after {
    content: '';
    position: absolute; top:0; left:0; width:100%; height:100%;
    background:
      radial-gradient(ellipse at 25% 35%, rgba(180,143,212,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 65%, rgba(139,159,212,0.04) 0%, transparent 55%);
  }

  .video-center {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  .generate-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1.5px solid var(--silver-500);
    background: rgba(200,190,225,0.03);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .generate-btn:hover {
    border-color: var(--warm);
    box-shadow: 0 0 40px rgba(212,165,116,0.12), 0 0 80px rgba(212,165,116,0.05);
    transform: scale(1.08);
  }
  .generate-btn:hover svg { fill: var(--warm); }
  .generate-btn svg {
    width: 18px; height: 18px;
    fill: var(--silver-300);
    margin-left: 3px;
    transition: fill 0.3s;
  }

  .generate-btn.loading {
    border-color: var(--violet);
    animation: pulseRing 2s ease infinite;
    pointer-events: none;
  }
  .generate-btn.loading svg { display: none; }
  .generate-btn.loading::after {
    content: '';
    width: 18px; height: 18px;
    border: 1.5px solid transparent;
    border-top-color: var(--violet);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .generate-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--silver-500);
    transition: color 0.3s;
  }

  .video-scanlines {
    position: absolute; top:0; left:0; width:100%; height:100%;
    pointer-events: none;
    opacity: 0.015;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(200,190,225,0.1) 2px, rgba(200,190,225,0.1) 4px
    );
  }

  /* Generated narrative area */
  .verse-generated {
    margin-bottom: 50px;
    display: none;
  }
  .verse-generated.visible { display: block; }

  .gen-label {
    font-family: 'DM Mono', monospace;
    font-size: 7px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--violet-deep);
    margin-bottom: 20px;
  }

  .gen-narrative {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: 18px;
    line-height: 1.85;
    color: var(--silver-200);
  }

  .gen-narrative .sentence {
    opacity: 0;
    display: inline;
  }
  .gen-narrative .sentence.visible {
    animation: sentenceFade 0.8s ease forwards;
  }

  /* Actions */
  .verse-actions {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-bottom: 50px;
    border-radius: 5px;
    overflow: hidden;
    opacity:0; transform: translateY(16px);
  }
  .verse-actions.reveal { animation: revealUp 0.8s ease 0.55s forwards; }

  .v-action {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 16px 20px;
    background: rgba(200,190,225,0.02);
    color: var(--silver-400);
    cursor: pointer;
    transition: all 0.35s;
    display: flex; justify-content: space-between; align-items: center;
    border: none; width: 100%; text-align: left;
  }
  .v-action:hover {
    background: rgba(212,165,116,0.04);
    color: var(--silver-100);
  }
  .v-action .v-arrow {
    opacity: 0; transform: translateX(-8px);
    transition: all 0.35s;
    color: var(--warm);
  }
  .v-action:hover .v-arrow {
    opacity: 1; transform: translateX(0);
  }

  .v-action.pull:hover { background: rgba(212,165,116,0.06); }
  .v-action.remix:hover { background: rgba(139,159,212,0.05); }
  .v-action.letgo:hover { background: rgba(196,122,138,0.04); }
  .v-action.remix:hover .v-arrow { color: var(--cool); }
  .v-action.letgo:hover .v-arrow { color: var(--rose); }

  /* Convergence */
  .verse-convergence {
    padding-top: 40px;
    border-top: 1px solid rgba(200,190,225,0.05);
    margin-bottom: 80px;
    opacity:0; transform: translateY(16px);
  }
  .verse-convergence.reveal { animation: revealUp 0.8s ease 0.65s forwards; }

  .conv-label {
    font-family: 'DM Mono', monospace;
    font-size: 7px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 16px;
  }
  .conv-text {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 20px;
    line-height: 1.55;
    color: var(--warm);
    opacity: 0.75;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeSlideDown {
    from { opacity:0; transform: translateY(-10px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes revealUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes sentenceFade {
    from { opacity:0; }
    to { opacity:1; }
  }
  @keyframes pulseRing {
    0%, 100% { box-shadow: 0 0 0 0 rgba(180,143,212,0.2); }
    50% { box-shadow: 0 0 0 15px rgba(180,143,212,0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Cursor */
  #map-view:not(.hidden) ~ * { cursor: default; }
  body.on-map { cursor: crosshair; }
</style>
</head>
<body class="on-map">

<!-- Canvas layers -->
<canvas id="bg-field"></canvas>
<canvas id="threads"></canvas>
<canvas id="particles"></canvas>
<div class="atmosphere"></div>
<div class="grain"></div>

<!-- Portal transition overlay -->
<div id="portal-overlay"><canvas id="portal-canvas"></canvas></div>

<!-- Map View -->
<div id="map-view">
  <div class="header">
    <h1>Verse Walker</h1>
    <div class="sub">Alternate lives, threaded from what you searched for</div>
  </div>
  <div class="footer-left">
    <span><em id="s-threads">0</em> threads · <em id="s-verses">0</em> verses detected</span>
  </div>
  <div class="footer-right">
    <p>Hover to see a memory</p>
    <p>Click to enter its timeline</p>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tip-chrome">
    <div class="tip-time" id="t-time"></div>
    <div class="tip-url" id="t-url"></div>
    <div class="tip-title" id="t-title"></div>
    <div class="tip-whisper" id="t-whisper"></div>
    <div class="tip-cta"><span>Click</span> to enter this verse</div>
  </div>
</div>

<!-- Verse View -->
<div id="verse-view">
  <button class="verse-back" id="verse-back" onclick="exitVerse()">← Return to map</button>
  <div class="verse-container" id="verse-container"></div>
</div>

// ============================================================
// CANVAS SETUP
// ============================================================
const bgCanvas = document.getElementById('bg-field');
const bgCtx = bgCanvas.getContext('2d');
const threadCanvas = document.getElementById('threads');
const threadCtx = threadCanvas.getContext('2d');
const partCanvas = document.getElementById('particles');
const partCtx = partCanvas.getContext('2d');
const portalCanvas = document.getElementById('portal-canvas');
const portalCtx = portalCanvas.getContext('2d');

let W, H, time = 0, mouseX = -1000, mouseY = -1000;
let hoveredNode = null, activeVerse = null;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  [bgCanvas, threadCanvas, partCanvas, portalCanvas].forEach(c => {
    c.width = W; c.height = H;
  });
}
window.addEventListener('resize', () => { resize(); buildGraph(); });
resize();

// ============================================================
// GRAPH — Nodes & Threads
// ============================================================
let memNodes = [], bgNodes = [], allThreads = [];
const centerX = () => W * 0.5;
const centerY = () => H * 0.5;

class MemNode {
  constructor(x, y, idx) {
    this.bx = x; this.by = y; this.x = x; this.y = y;
    this.idx = idx;
    this.r = 5;
    this.phase = Math.random() * Math.PI * 2;
    this.col = memories[idx].color;
    this.hoverAmt = 0;
  }
  update(t) {
    const dx = mouseX - this.x, dy = mouseY - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const pull = Math.max(0, 1 - dist/220);
    this.x = this.bx + Math.sin(t*0.28+this.phase)*12 + dx*pull*0.04;
    this.y = this.by + Math.cos(t*0.22+this.phase)*10 + dy*pull*0.04;
    const isHover = dist < 45;
    this.hoverAmt += (isHover ? 1 : 0 - this.hoverAmt) * 0.08;
    if (isHover) hoveredNode = this;
  }
  draw(t) {
    const pulse = 0.5 + 0.5*Math.sin(t*0.7+this.phase);
    const h = this.hoverAmt;
    const [r,g,b] = this.col;

    // Outer aura
    const aR = this.r * (5 + h*8);
    const aGrad = threadCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,aR);
    aGrad.addColorStop(0, `rgba(${r},${g},${b},${0.08*pulse + h*0.15})`);
    aGrad.addColorStop(0.4, `rgba(${r},${g},${b},${0.02*pulse})`);
    aGrad.addColorStop(1, 'transparent');
    threadCtx.fillStyle = aGrad;
    threadCtx.beginPath();
    threadCtx.arc(this.x, this.y, aR, 0, Math.PI*2);
    threadCtx.fill();

    // Ring
    if (h > 0.05) {
      threadCtx.strokeStyle = `rgba(${r},${g},${b},${h*0.3})`;
      threadCtx.lineWidth = 1;
      threadCtx.beginPath();
      threadCtx.arc(this.x, this.y, this.r*(2.5+h*2), 0, Math.PI*2);
      threadCtx.stroke();
    }

    // Core
    const coreGrad = threadCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*(1+h*0.6));
    coreGrad.addColorStop(0, `rgba(240,236,245,${0.7+pulse*0.3})`);
    coreGrad.addColorStop(0.6, `rgba(${r},${g},${b},${0.5+h*0.3})`);
    coreGrad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    threadCtx.fillStyle = coreGrad;
    threadCtx.beginPath();
    threadCtx.arc(this.x, this.y, this.r*(1+h*0.6), 0, Math.PI*2);
    threadCtx.fill();
  }
}

class BgNode {
  constructor() {
    this.bx = Math.random()*W; this.by = Math.random()*H;
    this.x = this.bx; this.y = this.by;
    this.phase = Math.random()*Math.PI*2;
    this.r = 0.8 + Math.random()*1.2;
    this.brightness = 0.15 + Math.random()*0.25;
  }
  update(t) {
    this.x = this.bx + Math.sin(t*0.15+this.phase)*5;
    this.y = this.by + Math.cos(t*0.12+this.phase)*4;
  }
  draw() {
    threadCtx.fillStyle = `rgba(200,190,225,${this.brightness})`;
    threadCtx.beginPath();
    threadCtx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    threadCtx.fill();
  }
}

class SilverThread {
  constructor(a, b, opacity) {
    this.a = a; this.b = b;
    this.cp1 = { x:(Math.random()-0.5)*180, y:(Math.random()-0.5)*180 };
    this.cp2 = { x:(Math.random()-0.5)*180, y:(Math.random()-0.5)*180 };
    this.phase = Math.random()*Math.PI*2;
    this.baseOpacity = opacity || (0.04 + Math.random()*0.08);
  }
  draw(t) {
    const ax=this.a.x, ay=this.a.y, bx=this.b.x, by=this.b.y;
    const mx=(ax+bx)/2, my=(ay+by)/2;
    const cx1=mx+this.cp1.x+Math.sin(t*0.18+this.phase)*25;
    const cy1=my+this.cp1.y+Math.cos(t*0.14+this.phase)*25;
    const cx2=mx+this.cp2.x+Math.cos(t*0.16+this.phase)*25;
    const cy2=my+this.cp2.y+Math.sin(t*0.2+this.phase)*25;
    const mdx=mouseX-mx, mdy=mouseY-my;
    const md=Math.sqrt(mdx*mdx+mdy*mdy);
    const mi=Math.max(0,1-md/280);
    const alpha = this.baseOpacity + mi*0.12;

    // Determine color from connected memory nodes
    let col = '200,190,225';
    if (this.a.col) col = this.a.col.join(',');
    else if (this.b.col) col = this.b.col.join(',');

    threadCtx.strokeStyle = `rgba(${col},${alpha})`;
    threadCtx.lineWidth = 0.4 + mi*1;
    threadCtx.beginPath();
    threadCtx.moveTo(ax, ay);
    threadCtx.bezierCurveTo(cx1, cy1, cx2, cy2, bx, by);
    threadCtx.stroke();
  }
}

// Floating dust particles
let dustParticles = [];
class Dust {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*W;
    this.y = Math.random()*H;
    this.vx = (Math.random()-0.5)*0.15;
    this.vy = -0.05 - Math.random()*0.15;
    this.life = 1;
    this.decay = 0.0005 + Math.random()*0.001;
    this.r = 0.3 + Math.random()*0.7;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    partCtx.fillStyle = `rgba(210,200,235,${this.life*0.2})`;
    partCtx.beginPath();
    partCtx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    partCtx.fill();
  }
}

function buildGraph() {
  memNodes = []; bgNodes = []; allThreads = []; dustParticles = [];
  const cx = centerX(), cy = centerY();

  // Center phantom node
  const phantom = { x: cx, y: cy, bx: cx, by: cy, phase: 0, update(){
    this.x = this.bx + Math.sin(time*0.1)*3; this.y = this.by + Math.cos(time*0.08)*3;
  }};

  memories.forEach((m, i) => {
    const angle = (i / memories.length)*Math.PI*2 - Math.PI/2 + (Math.random()-0.5)*0.25;
    const dist = Math.min(W,H) * (0.22 + Math.random()*0.12);
    const x = cx + Math.cos(angle)*dist;
    const y = cy + Math.sin(angle)*dist;
    const node = new MemNode(x, y, i);
    memNodes.push(node);
    allThreads.push(new SilverThread(phantom, node, 0.06+Math.random()*0.06));
  });

  // Cross-connections
  for (let i=0; i<memNodes.length; i++) {
    const j = (i+1) % memNodes.length;
    allThreads.push(new SilverThread(memNodes[i], memNodes[j], 0.025+Math.random()*0.03));
    if (Math.random()>0.5) {
      const k = (i+3) % memNodes.length;
      allThreads.push(new SilverThread(memNodes[i], memNodes[k], 0.015+Math.random()*0.02));
    }
  }

  // Background stars
  for (let i=0; i<50; i++) {
    const bg = new BgNode();
    bgNodes.push(bg);
    if (Math.random()>0.55) {
      const nearest = memNodes[Math.floor(Math.random()*memNodes.length)];
      allThreads.push(new SilverThread(bg, nearest, 0.01+Math.random()*0.025));
    }
  }

  // Dust
  for (let i=0; i<80; i++) dustParticles.push(new Dust());

  document.getElementById('s-threads').textContent = allThreads.length;
  document.getElementById('s-verses').textContent = memories.length;

  // Store phantom for updates
  buildGraph._phantom = phantom;
}
buildGraph();

// ============================================================
// BACKGROUND FIELD — subtle nebula
// ============================================================
function drawBgField() {
  bgCtx.clearRect(0,0,W,H);
  // Slow-moving subtle color blobs
  const cx = W*0.5, cy = H*0.5;
  const g1 = bgCtx.createRadialGradient(
    cx + Math.sin(time*0.04)*80, cy + Math.cos(time*0.03)*60, 0,
    cx, cy, W*0.5
  );
  g1.addColorStop(0, 'rgba(180,143,212,0.012)');
  g1.addColorStop(0.5, 'rgba(139,159,212,0.006)');
  g1.addColorStop(1, 'transparent');
  bgCtx.fillStyle = g1;
  bgCtx.fillRect(0,0,W,H);
}

// ============================================================
// TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');
function updateTooltip() {
  if (hoveredNode && hoveredNode.idx !== undefined && activeVerse === null) {
    const m = memories[hoveredNode.idx];
    document.getElementById('t-time').textContent = `${m.month} ${m.year}`;
    document.getElementById('t-url').textContent = m.url;
    document.getElementById('t-title').textContent = m.title;
    document.getElementById('t-whisper').textContent = m.whisper;

    let tx = hoveredNode.x + 30, ty = hoveredNode.y - 20;
    if (tx + 310 > W) tx = hoveredNode.x - 320;
    if (ty + 200 > H) ty = H - 210;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
}

// ============================================================
// PORTAL TRANSITION
// ============================================================
function portalTransition(node, callback) {
  const overlay = document.getElementById('portal-overlay');
  overlay.classList.add('active');
  const [cr,cg,cb] = node.col;
  let progress = 0;
  const ox = node.x, oy = node.y;

  function animatePortal() {
    progress += 0.018;
    portalCtx.clearRect(0,0,W,H);

    // Expanding rings
    const maxR = Math.sqrt(W*W+H*H);
    for (let i=0; i<5; i++) {
      const p = Math.max(0, progress - i*0.06);
      if (p <= 0) continue;
      const ease = 1 - Math.pow(1 - Math.min(p*1.2, 1), 3);
      const r = ease * maxR;
      const alpha = (1 - ease) * 0.15;
      portalCtx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
      portalCtx.lineWidth = 2 - i*0.3;
      portalCtx.beginPath();
      portalCtx.arc(ox, oy, r, 0, Math.PI*2);
      portalCtx.stroke();
    }

    // Central flash
    const flashP = Math.min(progress * 2, 1);
    const flashR = flashP * maxR * 1.2;
    const flashGrad = portalCtx.createRadialGradient(ox, oy, 0, ox, oy, flashR);
    flashGrad.addColorStop(0, `rgba(${cr},${cg},${cb},${(1-flashP)*0.2})`);
    flashGrad.addColorStop(0.3, `rgba(5,4,7,${flashP*0.95})`);
    flashGrad.addColorStop(1, `rgba(5,4,7,${flashP})`);
    portalCtx.fillStyle = flashGrad;
    portalCtx.fillRect(0,0,W,H);

    if (progress < 1) {
      requestAnimationFrame(animatePortal);
    } else {
      setTimeout(() => {
        callback();
        // Fade out portal
        let fadeOut = 1;
        function fadePortal() {
          fadeOut -= 0.03;
          portalCtx.clearRect(0,0,W,H);
          portalCtx.fillStyle = `rgba(5,4,7,${fadeOut})`;
          portalCtx.fillRect(0,0,W,H);
          if (fadeOut > 0) requestAnimationFrame(fadePortal);
          else overlay.classList.remove('active');
        }
        fadePortal();
      }, 200);
    }
  }
  animatePortal();
}

// ============================================================
// VERSE VIEW
// ============================================================
function enterVerse(idx) {
  activeVerse = idx;
  const node = memNodes[idx];
  portalTransition(node, () => showVerseContent(idx));
}

  const m = memories[idx];
  const a = m.alt;
  document.getElementById('map-view').classList.add('hidden');

  const container = document.getElementById('verse-container');
  container.innerHTML = `
    <div class="verse-origin reveal">${a.label}</div>
    <div class="verse-source-url reveal">${m.url}</div>
    <h2 class="verse-title reveal">${a.title}</h2>
    <div class="verse-subtitle reveal">${a.subtitle}</div>

    <div class="verse-video-area reveal">
      <div class="video-bg"></div>
      <div class="video-center">
        <div class="generate-btn" id="gen-btn" onclick="generateVerse(${idx})">
          <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
        </div>

    </div>

function exitVerse() {
  document.getElementById('verse-view').classList.remove('active');

  document.getElementById('map-view').classList.remove('hidden');
  document.body.classList.add('on-map');

// ============================================================
// CLAUDE API — Generate the alternate life
// ============================================================
async function generateVerse(idx) {
  const btn = document.getElementById('gen-btn');
  const label = document.getElementById('gen-label');
  const genArea = document.getElementById('verse-generated');
  const narDiv = document.getElementById('gen-narrative');
  const m = memories[idx];

  btn.classList.add('loading');
  label.textContent = 'Entering alternate timeline...';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [
          {
            role: "user",
            content: m.alt.prompt + "\n\nIMPORTANT: Return ONLY the narrative text. No titles, no labels, no markdown. Just the raw poetic prose. Write exactly 6-8 sentences."
          }
        ]
      })
    });

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');

    // Split into sentences and animate them in
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    narDiv.innerHTML = sentences.map((s, i) =>
      `<span class="sentence" style="animation-delay:${i*0.35}s">${s.trim()} </span>`
    ).join('');

    btn.classList.remove('loading');
    label.textContent = 'Verse complete';
    genArea.classList.add('visible');

    // Trigger sentence animations
    setTimeout(() => {
      narDiv.querySelectorAll('.sentence').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 350);
      });
    }, 100);

  } catch (err) {
    btn.classList.remove('loading');
    label.textContent = 'Could not reach this timeline';
    console.error(err);
  }
}

// ============================================================
// PULL INTO TIMELINE — action plan generation
// ============================================================
async function pullTimeline(idx) {
  const m = memories[idx];
  const genArea = document.getElementById('verse-generated');
  const narDiv = document.getElementById('gen-narrative');

  genArea.classList.add('visible');
  narDiv.innerHTML = '<span class="sentence visible" style="color:var(--violet);">Mapping path into this timeline...</span>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [
          {
            role: "user",
            content: `Someone explored an alternate life based on this browser history artifact: "${m.title}" (${m.whisper}). The alternate life was titled "${m.alt.title}" — ${m.alt.subtitle}.

Now they want to PULL aspects of this alternate life into their real life. Write 5 concrete, specific, poetic-but-actionable steps they could take THIS WEEK to move toward this version of themselves. Each step should be one sentence. Be specific — not "reflect on your goals" but "open a new Google Doc at 11pm and write the first paragraph of the thing you've been avoiding." The tone should be warm, direct, and slightly urgent — like advice from a version of yourself who already made it.

Return ONLY the 5 steps, numbered 1-5. No preamble.`
          }
        ]
      })
    });

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');
    const steps = text.split(/\d+[\.\)]\s*/).filter(Boolean);

    narDiv.innerHTML = `<div class="gen-label" style="color:var(--warm);margin-bottom:16px;">PULL INTO THIS TIMELINE — THIS WEEK</div>` +
      steps.map((s, i) =>
        `<span class="sentence" style="animation-delay:${i*0.4}s; display:block; margin-bottom:12px; padding-left:16px; border-left:1px solid var(--silver-600);">${s.trim()}</span>`
      ).join('');

    setTimeout(() => {
      narDiv.querySelectorAll('.sentence').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 400);
      });
    }, 100);

  } catch(err) {
    narDiv.innerHTML = '<span class="sentence visible" style="color:var(--rose);">This path is temporarily unreachable.</span>';
  }
}

// ============================================================
// CLICK HANDLING
// ============================================================
threadCanvas.style.position = 'fixed';
threadCanvas.style.zIndex = 2;
threadCanvas.style.pointerEvents = 'none';
partCanvas.style.pointerEvents = 'none';

// We use a transparent overlay for clicks
document.addEventListener('click', (e) => {
  if (activeVerse !== null) return;
  if (hoveredNode && hoveredNode.idx !== undefined) {
    enterVerse(hoveredNode.idx);
  }
});

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
});

// ============================================================
// MAIN LOOP
// ============================================================
function loop() {
  time += 0.016;
  hoveredNode = null;

  // Background
  drawBgField();

  // Threads + Nodes
  threadCtx.clearRect(0,0,W,H);
  if (buildGraph._phantom) buildGraph._phantom.update();
  bgNodes.forEach(n => { n.update(time); n.draw(); });
  allThreads.forEach(t => t.draw(time));
  memNodes.forEach(n => { n.update(time); n.draw(time); });

  // Dust
  partCtx.clearRect(0,0,W,H);
  dustParticles.forEach(d => { d.update(); d.draw(); });

  updateTooltip();
  requestAnimationFrame(loop);
}
loop();
</script>
