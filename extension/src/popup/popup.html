<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .container { padding: 20px; }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 12px; color: #737373; margin-bottom: 20px; }

    /* Auth form */
    #auth-section { display: none; }
    #auth-section.active { display: block; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #a3a3a3; margin-bottom: 4px; }
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #262626;
      border-radius: 6px;
      background: #171717;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus { border-color: #818cf8; }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #818cf8; color: white; }
    .btn-secondary { background: #262626; color: #e5e5e5; margin-top: 8px; }
    .error { color: #f87171; font-size: 12px; margin-top: 8px; display: none; }

    /* Connected section */
    #services-section { display: none; }
    #services-section.active { display: block; }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .user-email { font-size: 12px; color: #a3a3a3; }
    .logout { font-size: 11px; color: #818cf8; cursor: pointer; background: none; border: none; }

    .last-sync {
      font-size: 11px;
      color: #737373;
      text-align: center;
      margin-top: 12px;
    }
    .last-sync .time { color: #a3a3a3; }

    .status-msg {
      font-size: 11px;
      color: #34d399;
      text-align: center;
      margin-top: 8px;
    }
    .status-msg.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Everything Everywhere</h1>
    <p class="subtitle">Discover the paths you didn't take</p>

    <div id="auth-section" class="active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="login-btn">Log In</button>
      <button class="btn btn-secondary" id="signup-btn">Sign Up</button>
      <div class="error" id="auth-error"></div>
    </div>

    <div id="services-section">
      <div class="user-bar">
        <span class="user-email" id="user-email"></span>
        <button class="logout" id="logout-btn">Log out</button>
      </div>

      <button class="btn btn-primary" id="connect-all-btn">
        Send All Cookies
      </button>

      <div class="status-msg" id="status-msg"></div>
      <div class="last-sync" id="last-sync"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
