<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything Everywhere All at Once</title>
<link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="/index.css">
</head>
<body>
<canvas id="bg"></canvas>
<div class="vig"></div>

<div class="wrap">
  <div class="title">Everything Everywhere All at Once</div>
  <h1>The lives you <em>almost</em> lived</h1>
  <p class="sub">Your browser history, abandoned drafts, and forgotten files hold the ghost of every path you didn't take. We find them.</p>

  <div class="form" id="form">
    <input type="email" id="email" placeholder="email" autocomplete="email">
    <input type="password" id="password" placeholder="password" autocomplete="current-password">
    <div class="err" id="err"></div>
    <button class="btn-primary" id="submit" onclick="handleSubmit()">Enter the multiverse</button>
    <button class="btn-secondary" id="alt" onclick="toggleMode()">Create account</button>
    <div class="toggle" id="toggle-text">No account? <a onclick="toggleMode()">Sign up</a></div>
    <div class="toggle" style="margin-top:16px"><a href="/explore" style="color:var(--warm);text-decoration:none">Or browse other people's multiverses</a></div>
  </div>
</div>

<div class="footer"><span>Your data stays yours &middot; We only read, never write</span></div>

<script src="/particles.js"></script>
<script src="/index.js"></script>
</body>
</html>
